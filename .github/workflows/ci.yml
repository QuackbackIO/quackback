name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  DATABASE_URL: postgresql://postgres:password@localhost:5432/quackback_test
  BETTER_AUTH_SECRET: test-secret-for-ci-only-must-be-at-least-32-characters
  BASE_URL: http://localhost:3000

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      # Build the widget bundle first — apps/web imports
      # packages/widget/dist/browser.js via Vite ?raw, so it must exist
      # before the web build runs.
      - run: bun run --filter @quackback/widget build
      - run: bun run build
        env:
          SKIP_ENV_VALIDATION: true
      - run: bun run --filter @quackback/web typecheck

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: quackback_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so the differential-coverage gate can diff against the
          # PR base ref.
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run db:migrate
      # Runs the full suite AND emits coverage/coverage-final.json (v8). Test
      # failures fail this step (and the job) as before.
      - run: bun run test:coverage
      # Enforce 100% line + branch coverage on the lines this PR changed. No-op
      # on pushes to main (empty diff). Never masked with continue-on-error.
      - name: Differential coverage gate
        if: github.event_name == 'pull_request'
        env:
          DIFF_COVERAGE_BASE: ${{ github.event.pull_request.base.sha }}
          DIFF_COVERAGE_THRESHOLD: '100'
          DIFF_COVERAGE_REPORT: diff-coverage.md
        run: bun run test:diff-coverage
      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage/
            diff-coverage.md
          if-no-files-found: ignore
