{{- if .Values.minio.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "quackback.fullname" . }}-minio-init
  labels:
    {{- include "quackback.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio-init
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "quackback.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: minio-init
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-minio
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "quackback.fullname" . }}-minio 9000; do
                echo "Waiting for MinIO..."
                sleep 2
              done
              echo "MinIO is ready."
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: create-bucket
          image: minio/mc:latest
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.minio.rootUser | quote }}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "quackback.fullname" . }}-minio
                  key: MINIO_ROOT_PASSWORD
          command:
            - sh
            - -c
            - |
              mc alias set quackback {{ include "quackback.minioEndpoint" . }} "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
              mc mb --ignore-existing quackback/{{ .Values.minio.bucketName }}
              echo "Bucket '{{ .Values.minio.bucketName }}' is ready."
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
{{- end }}
