apiVersion: v1
kind: Secret
metadata:
  name: {{ include "quackback.fullname" . }}-secret
  labels:
    {{- include "quackback.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ required "secretKey is required — generate one with: openssl rand -base64 32" .Values.secretKey | quote }}
  {{- if not .Values.postgres.enabled }}
  DATABASE_URL: {{ required "externalDatabaseUrl is required when postgres.enabled=false" .Values.externalDatabaseUrl | quote }}
  {{- end }}
  {{- if not .Values.dragonfly.enabled }}
  REDIS_URL: {{ required "externalRedisUrl is required when dragonfly.enabled=false" .Values.externalRedisUrl | quote }}
  {{- end }}
  {{- if .Values.internalTaskSecret }}
  INTERNAL_TASK_SECRET: {{ .Values.internalTaskSecret | quote }}
  {{- end }}
  {{- if .Values.email.smtp.pass }}
  EMAIL_SMTP_PASS: {{ .Values.email.smtp.pass | quote }}
  {{- end }}
  {{- if .Values.email.resendApiKey }}
  EMAIL_RESEND_API_KEY: {{ .Values.email.resendApiKey | quote }}
  {{- end }}
  {{- if .Values.oauth.github.clientId }}
  GITHUB_CLIENT_ID: {{ .Values.oauth.github.clientId | quote }}
  GITHUB_CLIENT_SECRET: {{ .Values.oauth.github.clientSecret | quote }}
  {{- end }}
  {{- if .Values.oauth.google.clientId }}
  GOOGLE_CLIENT_ID: {{ .Values.oauth.google.clientId | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.oauth.google.clientSecret | quote }}
  {{- end }}
  {{- if .Values.ai.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.ai.openaiApiKey | quote }}
  {{- end }}
