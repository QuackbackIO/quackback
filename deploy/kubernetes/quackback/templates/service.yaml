apiVersion: v1
kind: Service
metadata:
  name: {{ include "quackback.fullname" . }}
  labels:
    {{- include "quackback.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.app.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "quackback.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: app
