{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "quackback.fullname" . }}-postgres
  labels:
    {{- include "quackback.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ include "quackback.postgresPassword" . | quote }}
{{- end }}
